<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | VOID</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <a href="index.html" class="logo">VOID</a>

    <nav class="nav">
      <a href="index.html">Início</a>
      <a href="produtos.html">Produtos</a>
      <a href="favoritos.html">Favoritos</a>
      <a href="carrinho.html">Carrinho</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <h1>Entrar na VOID</h1>
      <p>Acesse sua conta para continuar.</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="seuemail@email.com" />
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" required placeholder="Sua senha" />
        </div>

        <button type="submit" class="btn-primary">Entrar</button>

        <p id="loginMessage" class="form-message"></p>
      </form>
    </section>
  </main>

  <script type="module" src="auth.js"></script>
</body>
</html>
