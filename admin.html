<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | VOID</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="admin">

  <header class="header">
    <a href="index.html" class="logo">VOID</a>

    <nav class="nav">
      <a href="index.html">Loja</a>
      <a href="produtos.html">Produtos</a>
      <a href="admin.html">Admin</a>
      <button id="logoutBtn" class="btn-logout">Sair</button>
    </nav>
  </header>

  <main class="admin-page">
    <section class="admin-hero">
      <h1>Painel Administrativo</h1>
      <p>Bem-vindo, <strong id="userEmail">carregando...</strong></p>
    </section>

    <section class="admin-grid">
      <div class="admin-card">
        <h2>Produtos</h2>
        <p>Gerencie os produtos da loja VOID.</p>
        <button class="btn-primary">Adicionar produto</button>
      </div>

      <div class="admin-card">
        <h2>Pedidos</h2>
        <p>Visualize pedidos feitos pelos clientes.</p>
        <button class="btn-secondary">Ver pedidos</button>
      </div>

      <div class="admin-card">
        <h2>Estoque</h2>
        <p>Controle tamanhos, quantidades e disponibilidade.</p>
        <button class="btn-secondary">Gerenciar estoque</button>
      </div>
    </section>
  </main>

  <script type="module" src="auth.js"></script>
</body>
</html>
