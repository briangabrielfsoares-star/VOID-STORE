<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favoritos - VOID</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">

<a href="index.html" class="logo">
VOID
</a>

<div class="search-box">
<input type="text" placeholder="Pesquisar...">
</div>

<div class="nav-actions">

<a href="carrinho.html">Carrinho</a>

<a href="perfil.html">Conta</a>

</div>

</header>

<section class="favorites-page">

<h1>Seus Favoritos</h1>

<div id="favorites-container" class="product-grid">

<p>Nenhum favorito encontrado.</p>

</div>

</section>

<script>

const favoritos =
JSON.parse(localStorage.getItem("voidFavoritos")) || [];

const container =
document.getElementById("favorites-container");

if(favoritos.length > 0){

container.innerHTML = "";

favoritos.forEach((produto,index)=>{

container.innerHTML += `

<div class="product">

<img src="${produto.imagem}">

<h3>${produto.nome}</h3>

<span>
R$ ${Number(produto.preco).toFixed(2)}
</span>

<button onclick="adicionarCarrinho(${index})">

Adicionar ao Carrinho

</button>

<br><br>

<button onclick="removerFavorito(${index})">

Remover

</button>

</div>

`;

});

}

function adicionarCarrinho(index){

const favoritos =
JSON.parse(localStorage.getItem("voidFavoritos")) || [];

const carrinho =
JSON.parse(localStorage.getItem("voidCarrinho")) || [];

carrinho.push(favoritos[index]);

localStorage.setItem(
"voidCarrinho",
JSON.stringify(carrinho)
);

alert("Produto adicionado ao carrinho!");

}

function removerFavorito(index){

const favoritos =
JSON.parse(localStorage.getItem("voidFavoritos")) || [];

favoritos.splice(index,1);

localStorage.setItem(
"voidFavoritos",
JSON.stringify(favoritos)
);

location.reload();

}

</script>

<script src="app.js"></script>

</body>
</html>
